version: "3.8"

services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: laddr
      POSTGRES_USER: laddr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laddr"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: python -m laddr.api.main
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  dispatcher:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: python -m laddr.core.dispatcher
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  dashboard:
    image: agnetlabs/laddrdashboard:latest
    ports:
      - "5173:80"
    environment:
      VITE_API_URL: http://api:8000

  venice-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: laddr worker start --config /config/venice.yml
    volumes:
      - ./workers/venice.yml:/config/venice.yml
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy


volumes:
  redis-data:
  postgres-data:
  minio-data:
