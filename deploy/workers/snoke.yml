# Example Mac worker config — copy to ~/.laddr/worker.yml on snoke
node: snoke
worker_id: snoke-01

llm:
  provider: lmstudio
  endpoint: http://localhost:1234/v1
  model: google/gemma-4-26b-a4b

mcps:
  - holocron
  - context7
  - nano-banana

skills:
  - web-research
  - code-gen
  - script-exec
  - image-gen

max_concurrent: 2

server:
  redis_url: redis://:YOUR_REDIS_PASSWORD@100.x.x.x:6379
  minio_endpoint: 100.x.x.x:9000
  api_url: http://100.x.x.x:8000
